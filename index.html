<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interview Studio · AI English Interview Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#140f2b;--bg2:#1d1540;--bg3:#0c0920;
    --rose:#ff9ecb;--lav:#b9a4ff;--vio:#8b6cff;--cyan:#76e7ff;
    --ink:#f3eefe;--muted:#b3a8d6;--dim:#7d7299;
    --line:rgba(185,164,255,.16);--glass:rgba(40,29,72,.5);--good:#7fe6b0;--warn:#ffd479;
    --radius:22px;
  }
  *{box-sizing:border-box}html,body{margin:0;min-height:100%}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);min-height:100vh;
    background:var(--bg3);position:relative;overflow-x:hidden;
    display:flex;flex-direction:column;align-items:center;padding:26px 16px 80px}
  /* ---------- deep-space layered background ---------- */
  .cosmos{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
    background:
      radial-gradient(900px 620px at 10% -8%,rgba(255,158,203,.16),transparent 60%),
      radial-gradient(1100px 760px at 92% 2%,rgba(139,108,255,.30),transparent 62%),
      radial-gradient(820px 820px at 50% 116%,rgba(118,231,255,.10),transparent 60%),
      linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3))}
  .nebula{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;mix-blend-mode:screen;animation:drift 26s ease-in-out infinite alternate}
  .nebula.a{width:520px;height:520px;left:-120px;top:-80px;background:radial-gradient(circle,rgba(139,108,255,.55),transparent 70%)}
  .nebula.b{width:460px;height:460px;right:-120px;top:120px;background:radial-gradient(circle,rgba(255,158,203,.45),transparent 70%);animation-delay:-8s}
  .nebula.c{width:560px;height:560px;left:30%;bottom:-220px;background:radial-gradient(circle,rgba(118,231,255,.30),transparent 70%);animation-delay:-14s}
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.12)}}
  .stars,.stars2{position:absolute;inset:0}
  .star{position:absolute;border-radius:50%;background:#fff;animation:tw 4s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.9}}
  .shoot{position:absolute;width:120px;height:1px;background:linear-gradient(90deg,#fff,transparent);opacity:0;
    transform:rotate(18deg);animation:shoot 9s linear infinite}
  @keyframes shoot{0%{opacity:0;transform:translate(0,0) rotate(18deg)}3%{opacity:.9}12%{opacity:0;transform:translate(380px,120px) rotate(18deg)}100%{opacity:0}}

  .wrap{width:100%;max-width:720px;position:relative;z-index:1}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}
  .serif{font-family:'Fraunces',serif;font-style:italic}
  a{color:var(--lav)}

  header.top{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .logo{width:44px;height:44px;border-radius:50%;position:relative;flex:none;
    background:radial-gradient(circle at 34% 30%,var(--rose),#d65a96 72%);box-shadow:0 0 28px rgba(255,158,203,.55)}
  .logo::after{content:"✦";position:absolute;top:-8px;right:-6px;color:var(--lav);font-size:13px}
  header.top h1{font-size:23px;margin:0;font-weight:600}
  header.top span{color:var(--muted);font-size:13px}

  .card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line);border-radius:var(--radius);padding:26px;
    box-shadow:0 30px 70px -40px #000,inset 0 1px 0 rgba(255,255,255,.05)}

  .seclabel{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-size:13px;
    letter-spacing:.04em;color:var(--lav);margin:0 0 13px;font-weight:500}
  .seclabel .n{display:inline-flex;width:23px;height:23px;border-radius:50%;align-items:center;justify-content:center;
    font-size:12px;background:linear-gradient(135deg,var(--vio),var(--rose));color:#140f2b;font-weight:700}
  .field{margin-top:26px}
  .grid{display:grid;gap:12px}.cols-3{grid-template-columns:repeat(3,1fr)}.cols-4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:560px){.cols-3,.cols-4{grid-template-columns:1fr 1fr}}

  /* ---------- option tiles: the "light-up" gradient press effect (kept + enhanced) ---------- */
  .opt{cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:16px;
    padding:14px 12px;text-align:left;color:var(--ink);font-size:14px;font-weight:500;line-height:1.25;
    transition:transform .16s,border-color .16s,box-shadow .25s,background .25s;position:relative;overflow:hidden}
  .opt .ic{font-size:20px;display:block;margin-bottom:7px}
  .opt small{display:block;color:var(--muted);font-weight:400;font-size:11.5px;margin-top:3px}
  .opt:hover{border-color:var(--lav);transform:translateY(-1px)}
  .opt[aria-pressed="true"]{border-color:transparent;color:#140f2b;
    background:linear-gradient(135deg,var(--lav),var(--rose));
    box-shadow:0 0 0 1px rgba(255,255,255,.25),0 12px 30px -8px var(--rose),0 0 40px -6px rgba(255,158,203,.6)}
  .opt[aria-pressed="true"] small{color:rgba(20,15,43,.72)}
  .opt[aria-pressed="true"]::before{content:"";position:absolute;inset:0;border-radius:16px;
    background:radial-gradient(120% 80% at 50% 0%,rgba(255,255,255,.5),transparent 60%);opacity:.6;pointer-events:none}

  /* interviewer cards (bigger, with face thumbnail) */
  .person{display:flex;gap:12px;align-items:center;text-align:left}
  .person .face{width:52px;height:52px;border-radius:14px;object-fit:cover;object-position:center 22%;flex:none;
    border:1px solid rgba(255,255,255,.18)}
  .person .pmeta b{font-family:'Space Grotesk';font-size:14.5px;display:block}
  .person .pmeta small{display:block;color:var(--muted);font-size:11px;margin-top:2px;font-weight:400}

  .slider-row{display:flex;align-items:center;gap:14px}
  input[type=range]{flex:1;accent-color:var(--rose)}
  .pill{font-family:'Space Grotesk';font-size:15px;min-width:128px;color:var(--rose)}
  .hint{color:var(--muted);font-size:12.5px;line-height:1.55;margin-top:9px}
  .voicebox{width:100%;margin-top:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);
    color:var(--ink);border-radius:12px;padding:11px 13px;font-family:inherit;font-size:13.5px}

  button.primary{margin-top:28px;width:100%;border:none;cursor:pointer;color:#140f2b;
    background:linear-gradient(95deg,var(--rose),var(--lav));font-family:'Space Grotesk';font-weight:700;font-size:16px;
    padding:16px;border-radius:16px;box-shadow:0 16px 36px -14px var(--rose);transition:.16s}
  button.primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
  button.ghost{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink);border-radius:13px;
    padding:11px 16px;cursor:pointer;font-family:inherit;font-size:14px}
  button.ghost:hover{border-color:var(--lav)}
  .status{font-size:13px;color:var(--muted);margin-top:12px;min-height:18px}
  .status.ok{color:var(--good)}.status.err{color:var(--rose)}

  /* ===================== INTERVIEW STAGE ===================== */
  .stage{display:none;text-align:center}
  /* The 3D "studio" enclosure: layered depth, floor, rim light */
  #studio{position:relative;width:100%;height:480px;border-radius:24px;overflow:hidden;
    border:1px solid var(--line);
    background:
      radial-gradient(120% 75% at 50% 8%,#3a2a6b 0%,#241a44 45%,#120c28 100%);
    box-shadow:0 40px 90px -50px #000, inset 0 1px 0 rgba(255,255,255,.06)}
  /* receding floor grid for depth */
  #studio .floor{position:absolute;left:-20%;right:-20%;bottom:0;height:46%;
    background-image:linear-gradient(rgba(185,164,255,.16) 1px,transparent 1px),
      linear-gradient(90deg,rgba(185,164,255,.16) 1px,transparent 1px);
    background-size:46px 46px;transform:perspective(520px) rotateX(64deg);transform-origin:bottom;
    mask-image:linear-gradient(to top,#000 5%,transparent 80%);-webkit-mask-image:linear-gradient(to top,#000 5%,transparent 80%);opacity:.5}
  #studio .rim{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 55% at 50% 36%,transparent 60%,rgba(12,9,32,.7) 100%)}
  #studio .keylight{position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:120%;height:80%;pointer-events:none;
    background:radial-gradient(closest-side,rgba(185,164,255,.22),transparent 70%);filter:blur(4px)}

  /* avatar host fills the studio; avatar.js injects photo OR 3D canvas here */
  #avatarHost{position:absolute;inset:0;z-index:2}
  /* photoreal question clip (plays over the avatar when one exists) */
  #qVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:4;display:none;background:#0c0920}
  /* speaking / listening rings */
  #speakRing{position:absolute;inset:0;pointer-events:none;border-radius:24px;z-index:5;transition:.25s}
  #studio.speaking #speakRing{box-shadow:inset 0 0 100px -22px var(--rose);animation:glow 1.15s ease-in-out infinite}
  @keyframes glow{50%{box-shadow:inset 0 0 130px -18px var(--rose)}}
  #studio.listening #speakRing{box-shadow:inset 0 0 78px -28px var(--lav);animation:lis 2.4s ease-in-out infinite}
  @keyframes lis{50%{box-shadow:inset 0 0 100px -26px var(--lav)}}

  /* name plate */
  .nameplate{position:absolute;top:14px;left:14px;z-index:6;display:flex;align-items:center;gap:9px;
    background:rgba(12,9,32,.55);backdrop-filter:blur(8px);padding:8px 13px;border-radius:13px;border:1px solid rgba(255,255,255,.08)}
  .nameplate .dot{width:8px;height:8px;border-radius:50%;background:var(--good)}
  #studio.speaking .nameplate .dot{background:var(--warn);animation:tw 1s infinite}
  .nameplate b{font-family:'Space Grotesk';font-size:12px;display:block;line-height:1.1}
  .nameplate small{font-size:9.5px;color:var(--muted);display:block;margin-top:2px}

  /* live voice equalizer (audio-reactive cue while the examiner talks) */
  .eq{position:absolute;top:16px;right:16px;z-index:6;display:none;gap:3px;align-items:flex-end;height:22px;
    background:rgba(12,9,32,.5);padding:6px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
  #studio.speaking .eq{display:flex}
  .eq i{width:3px;height:6px;border-radius:2px;background:var(--rose);animation:eq 1s ease-in-out infinite}
  .eq i:nth-child(2){animation-delay:.15s}.eq i:nth-child(3){animation-delay:.3s}.eq i:nth-child(4){animation-delay:.45s}.eq i:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:5px}50%{height:20px}}

  /* candidate self-view PIP */
  .pip{position:absolute;bottom:16px;right:16px;z-index:6;width:118px;aspect-ratio:4/3;border-radius:14px;overflow:hidden;
    border:1px solid rgba(255,255,255,.14);background:#0c0920;display:none}
  .pip.on{display:block}
  .pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  .pip span{position:absolute;bottom:4px;right:6px;background:rgba(0,0,0,.55);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:5px}

  /* caption: TTS word-by-word highlight (real "talking to you" feel) */
  .caption{position:absolute;left:0;right:0;bottom:0;z-index:6;padding:18px 18px 16px;text-align:left;
    background:linear-gradient(to top,rgba(12,9,32,.94),rgba(12,9,32,.6) 60%,transparent);min-height:76px}
  .caption .kicker{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--lav);display:block;margin-bottom:5px}
  .caption .ct{font-size:15px;line-height:1.5;color:var(--ink)}
  .caption .ct .w{opacity:.4;transition:opacity .12s}
  .caption .ct .w.said{opacity:1;color:#fff;text-shadow:0 0 14px rgba(255,158,203,.45)}

  .progress{display:flex;gap:7px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16)}
  .dot.done{background:var(--lav)}.dot.now{background:var(--rose);box-shadow:0 0 10px var(--rose)}
  .askstate{font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--lav);margin:14px 0 2px;min-height:26px}

  .bigbtn{margin-top:12px;width:100%;border:none;cursor:pointer;border-radius:18px;padding:20px;
    font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#140f2b;
    background:linear-gradient(95deg,var(--lav),var(--rose));transition:.15s}
  .bigbtn.rec{background:linear-gradient(95deg,#ff6f9f,var(--rose));animation:rec 1.1s infinite}
  @keyframes rec{50%{filter:brightness(1.18)}}
  .bigbtn:disabled{opacity:.55;cursor:not-allowed;color:rgba(20,15,43,.6)}
  .subrow{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .live{margin-top:14px;padding:13px 15px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;
    text-align:left;font-size:13.5px;color:var(--muted);font-style:italic;display:none}
  .live.on{display:block}

  /* ===================== REPORT ===================== */
  .report{display:none}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
  .stat{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center}
  .stat b{display:block;font-family:'Space Grotesk';font-size:24px;color:var(--rose)}
  .stat small{color:var(--muted);font-size:11.5px}
  .fb{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-top:10px;font-size:14px;line-height:1.55}
  .qa{border-top:1px dashed var(--line);padding:12px 0;font-size:13.5px;line-height:1.5}
  .qa .q{color:var(--lav)}.qa .a{color:var(--muted)}
</style>
</head>
<body>
<div class="cosmos">
  <div class="nebula a"></div><div class="nebula b"></div><div class="nebula c"></div>
  <div class="stars" id="stars"></div>
  <div class="shoot" style="left:8%;top:18%"></div>
  <div class="shoot" style="left:60%;top:8%;animation-delay:-4.5s"></div>
</div>

<div class="wrap">
  <header class="top">
    <div class="logo"></div>
    <div><h1>Interview Studio</h1><span class="serif">practise out loud, with a face that talks back</span></div>
  </header>

  <!-- ===== SETUP ===== -->
  <section id="setup" class="card">
    <p class="seclabel"><span class="n">1</span> Choose a role</p>
    <div class="grid cols-3" id="roleGrid"></div>

    <div class="field"><p class="seclabel"><span class="n">2</span> Pick your interviewer</p>
      <div class="grid cols-3" id="personGrid"></div>
      <select id="voiceSelect" class="voicebox"><option>Loading voices…</option></select>
    </div>

    <div class="field"><p class="seclabel"><span class="n">3</span> Round</p>
      <div class="grid cols-3" id="roundGrid"></div></div>

    <div class="field"><p class="seclabel"><span class="n">4</span> How long</p>
      <div class="slider-row">
        <input type="range" id="mins" min="5" max="45" step="5" value="20">
        <span class="pill" id="minsLabel">20 min · ~8 Q</span></div></div>

    <label class="hint" style="display:flex;gap:8px;align-items:center;margin-top:18px">
      <input type="checkbox" id="intl" style="width:auto;accent-color:var(--rose)">
      Add international-candidate questions (visa, relocation, time zones)</label>

    <button class="primary" id="startBtn">Begin interview →</button>
    <p class="status" id="setupStatus"></p>
  </section>

  <!-- ===== STAGE ===== -->
  <section id="stage" class="stage card">
    <div id="studio">
      <div class="keylight"></div>
      <div class="floor"></div>
      <div id="avatarHost"></div>
      <video id="qVideo" playsinline preload="auto"></video>
      <div class="rim"></div>
      <div id="speakRing"></div>
      <div class="nameplate"><span class="dot"></span><div><b id="npName">—</b><small id="npTitle">—</small></div></div>
      <div class="eq"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="pip" id="pip"><video id="selfVideo" autoplay playsinline muted></video><span>YOU</span></div>
      <div class="caption"><span class="kicker" id="capKicker">Question</span><div class="ct" id="capText"></div></div>
    </div>

    <div class="progress" id="progress"></div>
    <div class="askstate" id="askState">…</div>
    <button class="bigbtn" id="bigBtn" disabled>Examiner is asking…</button>
    <div class="live" id="liveBox">Speak your answer…</div>
    <div class="subrow">
      <button class="ghost" id="repeatBtn">↺ Repeat question</button>
      <button class="ghost" id="camBtn">📷 Camera off</button>
      <button class="ghost" id="endBtn">Finish &amp; see summary</button>
    </div>
  </section>

  <!-- ===== REPORT ===== -->
  <section id="report" class="report card">
    <h2 style="margin:0">Your practice summary</h2>
    <p class="hint" id="reportRole" style="margin-top:4px"></p>
    <div class="statgrid" id="statgrid"></div>
    <div id="tips"></div>
    <h3 style="margin:22px 0 4px">What you said</h3>
    <div id="qaList"></div>
    <button class="primary" id="againBtn">Practise again</button>
  </section>
</div>

<!-- three.js engine for the optional 3D digital human (used by avatar.js) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="avatar.js"></script>
<script src="app.js"></script>
</body>
</html>
